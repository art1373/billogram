name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Type check
        run: yarn tsc --project tsconfig.app.json --noEmit
      - name: Lint
        run: yarn lint
      - name: Unit & integration tests
        run: yarn test --ci --coverage --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: test-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Production build
        run: yarn build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
